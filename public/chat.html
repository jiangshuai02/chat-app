<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chat - 即时通讯</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <svg viewBox="0 0 40 40" width="32" height="32"><rect width="40" height="40" rx="10" fill="#4f46e5"/><text x="20" y="26" text-anchor="middle" fill="white" font-size="20" font-weight="bold">C</text></svg>
          <span>ChatApp</span>
        </div>
        <button class="sidebar-close" onclick="toggleSidebar()">&times;</button>
      </div>
      <div class="sidebar-user">
        <div class="user-avatar" id="userAvatar">U</div>
        <div class="user-info">
          <span class="user-name" id="userName">加载中...</span>
          <span class="user-status online">在线</span>
        </div>
        <button class="btn-icon" onclick="handleLogout()" title="退出登录">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
      <div class="sidebar-search">
        <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="roomSearch" placeholder="搜索房间、创建者..." oninput="filterRooms(this.value)" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        <button class="search-clear" id="searchClear" onclick="clearRoomSearch()" style="display:none">&times;</button>
      </div>
      <div class="sidebar-rooms">
        <div class="rooms-header">
          <span>聊天房间</span>
          <button class="btn-icon" onclick="showCreateRoom()" title="创建房间">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
        <div class="rooms-list" id="roomsList"><div class="loading-spinner"></div></div>
      </div>
      <div class="sidebar-friends">
        <div class="friends-header">
          <span>好友</span>
          <button class="btn-icon" onclick="showAddFriend()" title="添加好友">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
        <div class="friends-list" id="friendsList"><div class="loading-spinner"></div></div>
        <div class="friend-requests" id="friendRequests" style="display:none"></div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="topbar">
        <button class="btn-icon hamburger" id="hamburgerBtn" onclick="toggleSidebar()">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <button class="btn-icon back-btn" id="mobileBackBtn" onclick="mobileBack()" title="返回" style="display:none">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        </button>
        <div class="topbar-info">
          <h2 class="topbar-title" id="currentRoomTitle">选择一个房间</h2>
          <span class="topbar-subtitle" id="currentRoomMeta"></span>
        </div>
        <div class="topbar-actions">
          <button class="btn-icon" id="backToRoomBtn" onclick="backToRoom()" title="返回房间" style="display:none">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          </button>
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          </button>
          <button class="btn-icon delete-room-btn" id="deleteRoomBtn" onclick="deleteCurrentRoom()" title="删除房间" style="display:none">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
          </button>
          <button class="btn-icon admin-btn" id="adminBtn" onclick="showAdminPanel()" title="管理后台" style="display:none">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
          <button class="btn-icon" onclick="showRoomMembers()" id="membersBtn" title="成员列表" style="display:none">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
          </button>
        </div>
      </header>

      <!-- Chat Area -->
      <div class="chat-area" id="chatArea">
        <div class="empty-state" id="emptyState">
          <svg viewBox="0 0 100 100" width="80" height="80" fill="none" stroke="#94a3b8" stroke-width="1.5"><rect x="10" y="25" width="80" height="60" rx="8"/><path d="M10 35l40 25 40-25"/><circle cx="35" cy="55" r="4" fill="#94a3b8"/><circle cx="50" cy="55" r="4" fill="#94a3b8"/><circle cx="65" cy="55" r="4" fill="#94a3b8"/></svg>
          <h3>欢迎来到 ChatApp</h3>
          <p>从左侧选择一个房间开始聊天，或创建一个新房间</p>
        </div>
        <div class="messages-container" id="messagesContainer" style="display:none">
          <div id="loadMore" class="load-more" style="display:none" onclick="loadMoreMessages()">加载更多消息</div>
          <div class="messages-list" id="messagesList"></div>
          <div class="typing-indicator" id="typingIndicator"></div>
        </div>
      </div>

      <!-- Input Area -->
      <div class="input-area" id="inputArea" style="display:none">
        <label class="image-upload-btn" title="发送图片">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <input type="file" id="imageUpload" accept="image/*" onchange="handleImageUpload(event)">
        </label>
        <button class="btn-icon emoji-btn" onclick="toggleEmojiPicker()" title="表情">😊</button>
        <div class="emoji-picker" id="emojiPicker" style="display:none"><div class="emoji-grid" id="emojiGrid"></div></div>
        <textarea id="messageInput" placeholder="输入消息..." rows="1" onfocus="resumeAudioContext()" oninput="autoResize(this); onTyping()" onkeydown="handleKeyDown(event)"></textarea>
        <button class="btn btn-send" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          <span>发送</span>
        </button>
      </div>
    </main>
  </div>

  <!-- Create Room Modal -->
  <div class="modal-overlay" id="createRoomModal" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header"><h3>创建聊天房间</h3><button class="btn-icon" onclick="closeCreateRoom()">&times;</button></div>
      <div class="modal-body">
        <div class="form-group"><label for="roomName">房间名称</label><input type="text" id="roomName" placeholder="输入房间名称" maxlength="30"></div>
        <div class="form-group"><label for="roomDesc">房间描述（可选）</label><textarea id="roomDesc" placeholder="简单描述一下这个房间" rows="3" maxlength="100"></textarea></div>
        <div class="form-group"><label for="roomPassword">房间密码（留空为公开房间）</label><input type="password" id="roomPassword" placeholder="不设置密码则所有人可进入" maxlength="50"></div>
        <p class="auth-error" id="roomError"></p>
      </div>
      <div class="modal-footer"><button class="btn btn-secondary" onclick="closeCreateRoom()">取消</button><button class="btn btn-primary" onclick="createRoom()">创建房间</button></div>
    </div>
  </div>

  <!-- Room Password Modal -->
  <div class="modal-overlay" id="roomPasswordModal" onclick="closeModal(event)">
    <div class="modal modal-sm" onclick="event.stopPropagation()">
      <div class="modal-header"><h3>🔒 输入房间密码</h3><button class="btn-icon" onclick="closeRoomPasswordModal()">&times;</button></div>
      <div class="modal-body">
        <p id="roomPasswordLabel" style="margin-bottom:12px;font-size:14px;"></p>
        <div class="form-group">
          <label>房间密码</label>
          <input type="password" id="roomPasswordInput" placeholder="输入密码">
        </div>
        <p class="auth-error" id="roomPasswordError"></p>
      </div>
      <div class="modal-footer"><button class="btn btn-secondary" onclick="closeRoomPasswordModal()">取消</button><button class="btn btn-primary" onclick="confirmRoomPassword()">进入房间</button></div>
    </div>
  </div>

  <!-- Members Modal -->
  <div class="modal-overlay" id="membersModal" onclick="closeModal(event)">
    <div class="modal modal-sm" onclick="event.stopPropagation()">
      <div class="modal-header"><h3>房间成员</h3><button class="btn-icon" onclick="closeMembers()">&times;</button></div>
      <div class="modal-body"><div class="members-list" id="membersList"><div class="loading-spinner"></div></div></div>
    </div>
  </div>

  <!-- ========== Admin Panel Modal ========== -->
  <div class="modal-overlay" id="adminModal" onclick="closeModal(event)">
    <div class="modal modal-lg" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3>🔧 管理后台</h3>
        <button class="btn-icon" onclick="closeAdminPanel()">&times;</button>
      </div>
      <div class="admin-tabs">
        <button class="admin-tab active" data-tab="keywords" onclick="switchAdminTab('keywords')">关键词屏蔽</button>
        <button class="admin-tab" data-tab="users" onclick="switchAdminTab('users')">用户管理</button>
        <button class="admin-tab" data-tab="rooms" onclick="switchAdminTab('rooms')">房间管理</button>
        <button class="admin-tab" data-tab="announcements" onclick="switchAdminTab('announcements')">公告管理</button>
        <button class="admin-tab" data-tab="private-msgs" onclick="switchAdminTab('private-msgs')">私聊记录</button>
      </div>
      <div class="modal-body admin-body">
        <!-- Keywords Tab -->
        <div class="admin-tab-content active" id="adminKeywords">
          <div class="admin-add-row">
            <input type="text" id="keywordInput" placeholder="输入要屏蔽的关键词" maxlength="50">
            <button class="btn btn-primary" onclick="addKeyword()">添加</button>
          </div>
          <div class="admin-list" id="keywordList"><div class="loading-spinner"></div></div>
        </div>
        <!-- Users Tab -->
        <div class="admin-tab-content" id="adminUsers">
          <div class="admin-list" id="userList"><div class="loading-spinner"></div></div>
        </div>
        <!-- Rooms Tab -->
        <div class="admin-tab-content" id="adminRooms">
          <div class="admin-list" id="adminRoomList"><div class="loading-spinner"></div></div>
        </div>
        <!-- Announcements Tab -->
        <div class="admin-tab-content" id="adminAnnouncements">
          <div class="admin-add-row" style="flex-direction:column;gap:8px;">
            <input type="text" id="announcementTitle" placeholder="公告标题" maxlength="200">
            <textarea id="announcementContent" placeholder="公告内容" rows="3" maxlength="1000"></textarea>
            <button class="btn btn-primary" onclick="addAnnouncement()" style="width:100%">发布公告</button>
          </div>
          <div class="admin-list" id="announcementList"><div class="loading-spinner"></div></div>
        </div>
        <!-- Private Messages Tab -->
        <div class="admin-tab-content" id="adminPrivateMsgs">
          <div class="admin-add-row" style="flex-direction:column;gap:8px;">
            <label style="font-size:13px;color:var(--gray-500);">选择用户查看私聊记录</label>
            <div style="display:flex;gap:8px;">
              <select id="adminPrivateUserSelect" style="flex:1;padding:8px 12px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-size:14px;">
                <option value="">请选择用户...</option>
              </select>
              <button class="btn btn-primary" onclick="loadAdminPrivateMessages()" style="width:auto;padding:8px 16px;">查看</button>
            </div>
          </div>
          <div class="admin-list" id="privateMsgList"><div style="text-align:center;padding:20px;color:var(--gray-400);font-size:13px;">请选择用户查看私聊记录</div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ========== User Detail Modal ========== -->
  <div class="modal-overlay" id="userDetailModal" onclick="closeModal(event)">
    <div class="modal modal-lg" onclick="event.stopPropagation()">
      <div class="modal-header"><h3 id="userDetailTitle">用户详情</h3><button class="btn-icon" onclick="closeUserDetail()">&times;</button></div>
      <div class="modal-body">
        <div id="userDetailContent"><div class="loading-spinner"></div></div>
      </div>
    </div>
  </div>

  <!-- ========== Mute Modal ========== -->
  <div class="modal-overlay" id="muteModal" onclick="closeModal(event)">
    <div class="modal modal-sm" onclick="event.stopPropagation()">
      <div class="modal-header"><h3>禁言设置</h3><button class="btn-icon" onclick="closeMuteModal()">&times;</button></div>
      <div class="modal-body">
        <p id="muteUserLabel" style="margin-bottom:12px;font-size:14px;"></p>
        <div class="form-group">
          <label>禁言时长</label>
          <select id="muteDuration">
            <option value="5">5 分钟</option>
            <option value="15">15 分钟</option>
            <option value="30">30 分钟</option>
            <option value="60" selected>1 小时</option>
            <option value="360">6 小时</option>
            <option value="1440">24 小时</option>
            <option value="10080">7 天</option>
            <option value="43200">30 天</option>
          </select>
        </div>
        <div class="form-group">
          <label>作用范围</label>
          <select id="muteScope">
            <option value="global">全部房间</option>
            <option value="current">当前房间</option>
          </select>
        </div>
        <p class="auth-error" id="muteError"></p>
      </div>
      <div class="modal-footer"><button class="btn btn-secondary" onclick="closeMuteModal()">取消</button><button class="btn btn-primary" onclick="confirmMute()">确认禁言</button></div>
    </div>
  </div>

  <!-- Announcement Popup Modal -->
  <div class="modal-overlay" id="announcementModal" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header"><h3 id="announcementPopupTitle">📢 公告</h3><button class="btn-icon" onclick="closeAnnouncementModal()">&times;</button></div>
      <div class="modal-body">
        <div id="announcementPopupContent" style="font-size:14px;line-height:1.6;white-space:pre-wrap;"></div>
      </div>
      <div class="modal-footer"><button class="btn btn-primary" onclick="closeAnnouncementModal()">我知道了</button></div>
    </div>
  </div>

  <!-- Edit Announcement Modal -->
  <div class="modal-overlay" id="editAnnouncementModal" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header"><h3>编辑公告</h3><button class="btn-icon" onclick="closeEditAnnouncementModal()">&times;</button></div>
      <div class="modal-body">
        <input type="hidden" id="editAnnouncementId">
        <div class="form-group"><label>标题</label><input type="text" id="editAnnouncementTitle" maxlength="200"></div>
        <div class="form-group"><label>内容</label><textarea id="editAnnouncementContent" rows="4" maxlength="1000"></textarea></div>
      </div>
      <div class="modal-footer"><button class="btn btn-secondary" onclick="closeEditAnnouncementModal()">取消</button><button class="btn btn-primary" onclick="saveAnnouncement()">保存</button></div>
    </div>
  </div>

  <!-- Add Friend Modal -->
  <div class="modal-overlay" id="addFriendModal" onclick="closeModal(event)">
    <div class="modal modal-sm" onclick="event.stopPropagation()">
      <div class="modal-header"><h3>添加好友</h3><button class="btn-icon" onclick="closeAddFriendModal()">&times;</button></div>
      <div class="modal-body">
        <div class="form-group">
          <label>搜索用户名</label>
          <input type="text" id="friendSearchInput" placeholder="输入用户名搜索" oninput="searchUsersForFriend(this.value)">
        </div>
        <div class="friend-search-results" id="friendSearchResults"></div>
        <p class="auth-error" id="friendError"></p>
      </div>
      <div class="modal-footer"><button class="btn btn-secondary" onclick="closeAddFriendModal()">关闭</button></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
